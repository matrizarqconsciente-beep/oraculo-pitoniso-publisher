name: Publicar en Redes Sociales

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      type:
        description: 'Tipo de publicación'
        required: true
        default: 'ranking'
        type: choice
        options:
          - ranking
          - daily

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pillow requests

      - name: Publicar ranking
        if: ${{ github.event.inputs.type == 'ranking' || github.event_name == 'schedule' }}
        env:
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          PAGE_ID: ${{ secrets.PAGE_ID }}
        run: python social_publisher.py ranking

      - name: Publicar resumen diario
        if: ${{ github.event.inputs.type == 'daily' }}
        env:
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          PAGE_ID: ${{ secrets.PAGE_ID }}
        run: python social_publisher.py daily
